services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pimoe
      POSTGRES_USER: pimoe
      POSTGRES_PASSWORD: ${PIMOE_POSTGRES_PASSWORD:-pimoe}
    ports:
      - "5432:5432"
    volumes:
      - pimoe-postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pimoe -d pimoe"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pimoe-postgres-data:
