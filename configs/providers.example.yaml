llms:
  default_provider: fake

  providers:
    openai:
      type: openai_compatible
      base_url: "https://api.openai.com/v1"
      api_key_env: "OPENAI_API_KEY"
      model: "gpt-4o-mini"
      timeout_seconds: 60

    deepseek:
      type: openai_compatible
      base_url: "https://api.deepseek.com/v1"
      api_key_env: "DEEPSEEK_API_KEY"
      model: "deepseek-chat"
      timeout_seconds: 60

    fake:
      type: fake
      model: "fake-tool-model"
      timeout_seconds: 1
